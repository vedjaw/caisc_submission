# svhn config (street view house numbers)
# TA=89.50%, FA=3.62% 
dataset: svhn
model: resnet18
forget_type: class
forget_class: 0       

epochs: 12
lr: 2e-4              # same LR as MNIST, works fine for both
batch_size: 128
weight_decay: 5e-4

forget_objective: kl_retain
rep_weight: 0.03      # lambda
kd_weight: 3.0        # beta
temperature: 4.0      
max_grad_norm: 1.0    

forget_gate: 0        
retain_budget_factor: 4.0
fa_target: 10.0       
fa_check_freq: 50     

data_dir: ./data
save_dir: ./checkpoints
checkpoint: ./checkpoints/base_svhn_resnet18.pth
