# STL-10 config -- small dataset, only 5k train images
# Empirical baseline on class 0: TA=84.95%, FA=8.80%
dataset: stl10
model: resnet18
forget_type: class
forget_class: 0       

epochs: 12
lr: 2e-4              # lower LR since dataset is small
batch_size: 128
weight_decay: 5e-4

forget_objective: kl_retain
rep_weight: 0.03      # low lambda, forget set is tiny (~500 samples)
kd_weight: 3.0        # higher kd_weight to keep retain stable
temperature: 4.0      
max_grad_norm: 1.0    

forget_gate: 0        
retain_budget_factor: 4.0
fa_target: 10.0       
fa_check_freq: 10     # check every 10 batches since there are so few

data_dir: ./data
save_dir: ./checkpoints
checkpoint: ./checkpoints/base_stl10_resnet18.pth
